<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>LLM Discourse Tracker | CUHK Research Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6 md:p-12">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10">
            <h1 class="text-4xl font-extrabold text-slate-900">LLM Discourse Landscape</h1>
            <p class="mt-2 text-lg text-slate-600 font-medium">Hybrid-Edge Semantic Analysis & IP Risk Pipeline</p>
            <div class="mt-4 h-1.5 w-24 bg-blue-600 rounded-full"></div>
        </header>

        <div class="bg-white shadow-2xl rounded-3xl overflow-hidden border border-slate-200">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-900 text-white">
                    <tr>
                        <th class="py-5 px-6 font-semibold uppercase text-sm tracking-wider">Channel & Video</th>
                        <th class="py-5 px-6 font-semibold uppercase text-sm tracking-wider">Speaker Stance / Core Thesis</th>
                        <th class="py-5 px-6 font-semibold uppercase text-sm tracking-wider text-center">IP Risk</th>
                    </tr>
                </thead>
                <tbody id="data-table" class="divide-y divide-slate-100">
                    <tr><td colspan="3" class="p-10 text-center text-slate-400">數據加載中...</td></tr>
                </tbody>
            </table>
        </div>
        
        <footer class="mt-8 text-slate-400 text-sm flex justify-between items-center">
            <span>Generated by Gemini CLI & yt-dlp Pipeline</span>
            <span>© 2026 Tsz Chun Liu (qwerty) | CUHK Cultural Studies</span>
        </footer>
    </div>

    <script>
        async function loadData() {
            try {
                // 1. 讀取 Python 生成的 data.json 陣列
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('找不到 data.json');
                
                const data = await response.json();
                const container = document.getElementById('data-table');
                container.innerHTML = ''; // 清空提示

                // 2. 解析數據並渲染
                data.reverse().forEach(entry => {
                    // 容錯處理：Gemini 輸出的 JSON 結構可能略有不同
                    const stance = entry.analysis?.speaker_stance || entry.ethnographic_report?.core_thesis || "N/A";
                    const riskRaw = entry.risk_assessment?.copyright_risk || "Low";
                    
                    let riskClass = "bg-green-100 text-green-700";
                    if (riskRaw.toLowerCase().includes("high")) riskClass = "bg-red-100 text-red-700";
                    if (riskRaw.toLowerCase().includes("medium")) riskClass = "bg-orange-100 text-orange-700";

                    const row = document.createElement('tr');
                    row.className = "hover:bg-slate-50 transition-colors";
                    row.innerHTML = `
                        <td class="py-6 px-6">
                            <div class="font-bold text-slate-900">${entry.channel_name}</div>
                            <div class="text-xs text-blue-500 mt-1">
                                <a href="https://youtube.com/watch?v=${entry.video_id}" target="_blank">View Source →</a>
                            </div>
                            <div class="text-sm text-slate-500 mt-1 italic leading-snug">${entry.video_title}</div>
                        </td>
                        <td class="py-6 px-6 text-sm text-slate-700 leading-relaxed">${stance}</td>
                        <td class="py-6 px-6 text-center">
                            <span class="px-3 py-1 rounded-full text-xs font-bold uppercase ${riskClass}">${riskRaw}</span>
                        </td>
                    `;
                    container.appendChild(row);
                });
            } catch (err) {
                console.error(err);
                document.getElementById('data-table').innerHTML = `<tr><td colspan="3" class="p-10 text-center text-red-500">⚠️ 數據加載失敗，請確認 data.json 是否已生成。</td></tr>`;
            }
        }
        loadData();
    </script>
</body>
</html>
