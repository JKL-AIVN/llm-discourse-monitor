<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LLM Discourse Tracker | CUHK Research Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6 md:p-12">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10">
            <h1 class="text-4xl font-extrabold text-slate-900">LLM Discourse Landscape</h1>
            <p class="mt-2 text-lg text-slate-600">Automated Semantic Analysis & IP Risk Monitoring Pipeline</p>
            <div class="mt-4 h-1 w-20 bg-blue-600"></div>
        </header>

        <div class="bg-white shadow-xl rounded-2xl overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-900 text-white">
                    <tr>
                        <th class="py-4 px-6 font-semibold">Channel & Video</th>
                        <th class="py-4 px-6 font-semibold">Speaker Stance</th>
                        <th class="py-4 px-6 font-semibold">Core Argument</th>
                        <th class="py-4 px-6 font-semibold text-center">IP Risk</th>
                    </tr>
                </thead>
                <tbody id="data-table" class="divide-y divide-slate-100">
                    </tbody>
            </table>
        </div>
        
        <footer class="mt-8 text-slate-400 text-sm">
            Generated by GPT-5.4-mini & yt-dlp Pipeline | © 2026 Tsz Chun Liu (qwerty)
        </footer>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('discourse_data.jsonl');
                const text = await response.text();
                const lines = text.trim().split('\n');
                const container = document.getElementById('data-table');

                lines.reverse().forEach(line => {
                    if (!line) return;
                    const entry = JSON.parse(line);
                    
                    // Risk level coloring
                    const risk = (entry.risk_assessment?.copyright_risk || entry.copyright_risk_level || "Unknown").toLowerCase();
                    let riskClass = "bg-green-100 text-green-700";
                    if(risk.includes("high")) riskClass = "bg-red-100 text-red-700";
                    if(risk.includes("medium")) riskClass = "bg-orange-100 text-orange-700";

                    const row = document.createElement('tr');
                    row.className = "hover:bg-slate-50 transition-colors";
                    row.innerHTML = `
                        <td class="py-5 px-6">
                            <div class="font-bold text-slate-900">${entry.channel_name}</div>
                            <div class="text-xs text-blue-500 mt-1">
                                <a href="https://youtube.com/watch?v=${entry.video_id}" target="_blank">View Video →</a>
                            </div>
                            <div class="text-sm text-slate-500 mt-1 italic">${entry.video_title}</div>
                        </td>
                        <td class="py-5 px-6 text-sm text-slate-700">${entry.analysis?.speaker_stance || entry.speaker_stance || ""}</td>
                        <td class="py-5 px-6 text-sm text-slate-600">${entry.analysis?.core_argument || entry.core_argument || ""}</td>
                        <td class="py-5 px-6 text-center">
                            <span class="px-3 py-1 rounded-full text-xs font-bold uppercase ${riskClass}">
                                ${risk.toUpperCase()}
                            </span>
                        </td>
                    `;
                    container.appendChild(row);
                });
            } catch (err) {
                console.error("Error loading JSONL:", err);
            }
        }
        loadData();
    </script>
</body>
</html>
