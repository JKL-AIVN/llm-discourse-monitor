<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Discourse Tracker | CUHK Research Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6 md:p-12">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10">
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">LLM Discourse Landscape</h1>
            <p class="mt-2 text-lg text-slate-600 font-medium">Automated Semantic Analysis & IP Risk Monitoring Pipeline</p>
            <div class="mt-4 h-1.5 w-24 bg-blue-600 rounded-full"></div>
        </header>

        <div class="bg-white shadow-2xl rounded-3xl overflow-hidden border border-slate-200">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-900 text-white">
                    <tr>
                        <th class="py-5 px-6 font-semibold uppercase text-sm tracking-wider">Channel & Video</th>
                        <th class="py-5 px-6 font-semibold uppercase text-sm tracking-wider">Speaker Stance</th>
                        <th class="py-5 px-6 font-semibold uppercase text-sm tracking-wider">Core Argument</th>
                        <th class="py-5 px-6 font-semibold uppercase text-sm tracking-wider text-center">IP Risk</th>
                    </tr>
                </thead>
                <tbody id="data-table" class="divide-y divide-slate-100">
                    </tbody>
            </table>
        </div>
        
        <footer class="mt-10 text-slate-400 text-sm flex justify-between items-center border-t border-slate-200 pt-6">
            <span>Powered by GPT-5.4-mini & yt-dlp Pipeline</span>
            <span class="font-medium text-slate-500">© 2026 Tsz Chun Liu (qwerty) | CUHK Cultural Studies</span>
        </footer>
    </div>

    <script>
        async function loadData() {
            try {
                // 1. 抓取資料庫檔案
                const response = await fetch('discourse_data.jsonl');
                if (!response.ok) throw new Error('無法讀取數據檔案');
                
                const text = await response.text();
                // 2. 修復：使用正確的換行符號分割
                const lines = text.trim().split('\n');
                const container = document.getElementById('data-table');

                // 3. 修復：正確的箭頭函數語法，並將最新影片排在最前
                lines.reverse().forEach(line => {
                    if (!line.trim()) return;
                    try {
                        const entry = JSON.parse(line);
                        
                        // 4. 取得風險等級 (兼容不同版本格式)
                        const risk = (entry.risk_assessment?.copyright_risk || entry.copyright_risk_level || "Unknown").toLowerCase();
                        
                        // 5. 設定標籤顏色
                        let riskClass = "bg-green-100 text-green-700 border-green-200";
                        if (risk.includes("high")) riskClass = "bg-red-100 text-red-700 border-red-200";
                        else if (risk.includes("medium")) riskClass = "bg-orange-100 text-orange-700 border-orange-200";

                        const row = document.createElement('tr');
                        row.className = "hover:bg-blue-50/30 transition-all duration-200";
                        row.innerHTML = `
                            <td class="py-6 px-6">
                                <div class="font-bold text-slate-900 text-base">${entry.channel_name}</div>
                                <div class="mt-1">
                                    <a href="https://youtube.com/watch?v=${entry.video_id}" target="_blank" 
                                       class="text-xs font-semibold text-blue-600 hover:text-blue-800 underline decoration-blue-200 underline-offset-4">
                                       Watch Source →
                                    </a>
                                </div>
                                <div class="text-sm text-slate-500 mt-2 leading-relaxed max-w-xs truncate" title="${entry.video_title}">
                                    ${entry.video_title}
                                </div>
                            </td>
                            <td class="py-6 px-6 text-sm text-slate-700 leading-relaxed">
                                ${entry.analysis?.speaker_stance || entry.speaker_stance || "N/A"}
                            </td>
                            <td class="py-6 px-6 text-sm text-slate-600 leading-relaxed italic">
                                "${entry.analysis?.core_argument || entry.core_argument || "N/A"}"
                            </td>
                            <td class="py-6 px-6 text-center">
                                <span class="px-3.5 py-1.5 rounded-full text-xs font-bold border ${riskClass}">
                                    ${risk.toUpperCase()}
                                </span>
                            </td>
                        `;
                        container.appendChild(row);
                    } catch (e) {
                        console.error("JSON 解析錯誤：", e);
                    }
                });
            } catch (err) {
                console.error("載入失敗：", err);
                document.getElementById('data-table').innerHTML = `<tr><td colspan="4" class="p-10 text-center text-red-500 font-bold">數據加載失敗，請檢查 discourse_data.jsonl 是否存在。</td></tr>`;
            }
        }
        loadData();
    </script>
</body>
</html>
