name: LLM Tracker Auto Update

on:
  schedule:
    - cron: '0 */12 * * *' # 每 12 小時跑一次
  workflow_dispatch: # 允許手動執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tracker
        env:
          CHATANYWHERE_API_KEY: ${{ secrets.CHATANYWHERE_API_KEY }}
        run: python tracker.py
      - name: Commit data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add discourse_data.jsonl
          git commit -m "Update discourse data" || echo "No changes"
          git push
