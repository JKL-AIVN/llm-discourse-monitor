name: LLM Tracker Auto Update

on:
  schedule:
    - cron: '0 */12 * * *' # 每 12 小時自動執行一次
  workflow_dispatch: # 允許手動點擊執行按鈕

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 消除 Node.js 版本警告

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 賦予寫入權限，以便 push 更新後的數據

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 指向子文件夾內的依賴清單
          pip install -r LLM-Tracker/requirements.txt

      - name: Run tracker
        env:
          # 讀取你在 GitHub Secrets 設置的密鑰
          CHATANYWHERE_API_KEY: ${{ secrets.CHATANYWHERE_API_KEY }}
        run: |
          if [ -z "$CHATANYWHERE_API_KEY" ]; then
            echo "❌ Error: CHATANYWHERE_API_KEY is not set."
            exit 1
          fi
          # 指向子文件夾內的腳本執行
          python LLM-Tracker/tracker.py

      - name: Commit data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 指定添加子文件夾內的數據檔案
          git add LLM-Tracker/discourse_data.jsonl
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update discourse data [skip ci]"
            git push
          fi
